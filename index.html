<!DOCTYPE html>
<html>

<head>
<title>Credit Card Fraud Detection</title>
</head>

<body>

<h2>Credit Card Fraud Detection</h2>

<form action="/predict" method="post">

<label>Transaction Time (in hours)</label><br>
<input type="number" step="any" name="time" placeholder="Enter time in hours" required><br><br>

<label>Transaction Amount</label><br>
<input type="number" step="any" name="amount" placeholder="Enter amount" required><br><br>

<button type="submit">Predict</button>

</form>

<h3>{{ prediction_text }}</h3>

</body>
</html>
